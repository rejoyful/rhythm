<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 리듬 미팅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&family=Doto:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <div class="brand">
      <h1 id="docTitle" contenteditable spellcheck="false">주간 리듬 미팅</h1>
      <span class="part" id="docPart" contenteditable spellcheck="false">UX 기획파트</span>
    </div>
    <div class="weekwrap"><span class="week" id="weekLabel"></span></div>
    <div class="head-right">
      <div class="today" id="today"></div>
      <div class="toolbar">
        <div class="selwrap" style="width:auto;"><select id="weekSel" class="fsel" style="height:2.4rem;" title="주차 선택"></select><span class="ms selcar">expand_more</span></div>
        <button class="iconbtn" id="newWeekBtn" aria-label="새 주차 시작" title="새 주차 시작"><span class="ms">event_repeat</span></button>
        <span class="saveind" id="saveind"><span class="ms">check</span>저장됨</span>
        <button class="iconbtn" id="themeBtn" aria-label="다크모드" title="다크모드"><span class="ms">dark_mode</span></button>
        <button class="iconbtn accent" id="addBtn" aria-label="과업 추가" title="과업 추가"><span class="ms">add</span></button>
      </div>
    </div>
  </header>

  <nav id="tabs">
    <button data-day="mon" class="active"><span class="en">MON</span><span class="tl">월요일 · 계획 정렬</span></button>
    <button data-day="wed"><span class="en">WED</span><span class="tl">수요일 · 중간 조율</span></button>
    <button data-day="fri"><span class="en">FRI</span><span class="tl">금요일 · 마감 체크</span></button>
  </nav>

  <div class="sheet">
    <div class="thead" id="thead"></div>
    <div class="tbody" id="tbody"></div>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <div><span class="m-title">과업 추가</span><span class="m-sub">6하원칙으로 작성하면 자동 정리됩니다</span></div>
        <button class="iconbtn ghost" id="mClose" aria-label="닫기"><span class="ms">close</span></button>
      </div>
      <textarea id="taskInput" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn" id="mCancel">취소</button>
        <button class="btn primary" id="mAdd"><span class="ms">add</span>추가</button>
      </div>
    </div>
  </div>

<script src="app.js"></script>
</body>
</html>
