<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>주간 리듬 미팅</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=Space+Mono:wght@400;700&family=Doto:wght@500;700;900&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200&display=block" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{
  --ink:#0a0a0a;--paper:#ffffff;--mut:#6b6b6b;--faint:#9b9b9b;
  --line:#e6e6e6;--line2:#d2d2d2;--fill:#0a0a0a;--empty:#e9e9e9;--red:#d71921;
  --disp:'Space Grotesk','Pretendard','Malgun Gothic',sans-serif;
  --body:'Pretendard','Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  --mono:'Space Mono','Consolas',monospace;
  --dot:'Doto','Space Mono',monospace;
}
body.dark{--ink:#f2f2f2;--paper:#0d0d0d;--mut:#9a9a9a;--faint:#666;--line:#262626;--line2:#3a3a3a;--fill:#f2f2f2;--empty:#2a2a2a;--red:#ff3b41;}
body.dark nav button:hover,body.dark .chip:hover,body.dark .fsel:hover{background:#1a1a1a;}
body.dark .chip.done{background:#f2f2f2;color:#0d0d0d;border-color:#f2f2f2;}
body.dark .chip.done:hover{background:#e0e0e0;color:#0d0d0d;}
body.dark nav button.active,body.dark nav button.active:hover{background:#f2f2f2;color:#0d0d0d;}
body.dark nav button.active .en{color:#777;}
body.dark [contenteditable]:hover{background:#1a1a1a;}
body.dark [contenteditable]:focus{background:#151515;}
body.dark .row.done .pri{color:#444;}
*{margin:0;padding:0;box-sizing:border-box;}
html{font-size:clamp(13px,0.94vw,19px);}
body{font-family:var(--body);color:var(--ink);background:var(--paper);
  height:100vh;display:flex;flex-direction:column;padding:2vh 3vw 2.4vh;overflow:hidden;
  -webkit-font-smoothing:antialiased;}
.ms{font-family:'Material Symbols Outlined';font-style:normal;line-height:1;
  letter-spacing:normal;text-transform:none;display:inline-block;white-space:nowrap;direction:ltr;
  font-feature-settings:'liga';font-variation-settings:'FILL' 0,'wght' 100,'GRAD' 0,'opsz' 24;}

header{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:1rem;
  padding-bottom:.2rem;}
.brand{justify-self:start;display:flex;align-items:center;gap:.85rem;}
h1{font-family:var(--disp);font-size:2.1rem;font-weight:700;letter-spacing:-.01em;line-height:1;}
.part{font-family:var(--body);font-size:1.2rem;font-weight:700;color:var(--red);
  letter-spacing:.02em;padding-left:.85rem;border-left:2px solid var(--line2);line-height:1;}
#docTitle:hover,#docPart:hover{background:transparent;}
#docTitle:focus,#docPart:focus{background:transparent;box-shadow:inset 0 -2px 0 var(--red);}
.weekwrap{justify-self:center;display:flex;align-items:center;}
.week{font-family:var(--dot);font-size:1.5rem;font-weight:700;color:var(--ink);letter-spacing:.05em;}
.head-right{justify-self:end;display:flex;align-items:center;gap:1.1rem;}
.today{font-family:var(--dot);font-size:1.4rem;font-weight:700;line-height:1;letter-spacing:.03em;white-space:nowrap;}
.toolbar{display:flex;align-items:center;gap:.5rem;}
.iconbtn{width:2.4rem;height:2.4rem;display:grid;place-items:center;background:var(--paper);
  border:1px solid var(--line2);cursor:pointer;color:var(--ink);transition:all .12s;}
.iconbtn .ms{font-size:1.3rem;}
.iconbtn:hover{background:var(--ink);color:var(--paper);}
.iconbtn:active{transform:translateY(1px);}
.iconbtn.accent{background:var(--red);border-color:var(--red);color:#fff;}
.iconbtn.accent:hover{background:#b3141b;}
.saveind{display:flex;align-items:center;gap:.25rem;font-family:var(--mono);font-size:.7rem;
  color:var(--faint);opacity:0;transition:opacity .2s;letter-spacing:.06em;margin-right:.2rem;}
.saveind.on{opacity:1;}
.saveind .ms{font-size:.95rem;color:var(--red);}

nav{display:flex;margin-top:1.2rem;border:1.5px solid var(--ink);}
nav button{flex:1;display:flex;align-items:baseline;justify-content:center;gap:.7rem;
  font-family:var(--body);font-size:1.05rem;font-weight:700;color:var(--mut);background:var(--paper);
  border:none;border-right:1.5px solid var(--ink);padding:.7rem 0;cursor:pointer;transition:all .14s;}
nav button:last-child{border-right:none;}
nav button .en{font-family:var(--mono);font-size:.78rem;letter-spacing:.16em;color:var(--faint);font-weight:700;}
nav button:hover{background:#f4f4f4;}
nav button.active{background:var(--ink);color:var(--paper);}
nav button.active .en{color:#bdbdbd;}

.sheet{flex:1;display:flex;flex-direction:column;min-height:0;margin-top:1rem;}
.thead,.row{display:grid;align-items:center;gap:1.4rem;}
.thead{padding:0 2.8rem 1rem 2.2rem;border-bottom:2px solid var(--ink);}
.thead .h{font-family:var(--mono);font-size:.78rem;letter-spacing:.12em;color:var(--mut);text-transform:uppercase;font-weight:700;}
.tbody{flex:1;display:grid;min-height:0;overflow:hidden;}
.row{position:relative;padding:0 2.8rem 0 2.2rem;border-bottom:1px solid var(--line);}
.row:last-child{border-bottom:none;}
.dragh{position:absolute;left:.45rem;top:50%;transform:translateY(-50%);width:1.6rem;height:1.9rem;
  display:none;place-items:center;color:var(--faint);cursor:grab;}
.dragh:active{cursor:grabbing;}
.dragh .ms{font-size:1.25rem;}
.row:hover .dragh{display:grid;}
.row.dragging{opacity:.4;}
.row.dragrow{opacity:.45;}
body.dragging-active{cursor:grabbing;user-select:none;}
body.dragging-active .dragh{cursor:grabbing;}
.row.dropbefore{box-shadow:inset 0 3px 0 var(--red);}
.row.dropafter{box-shadow:inset 0 -3px 0 var(--red);}
.row.dropnest{box-shadow:inset 0 0 0 2px var(--red);background:rgba(215,25,33,.05);}
.row.child{background:rgba(0,0,0,.025);}
body.dark .row.child{background:rgba(255,255,255,.04);}
.row.child .what{padding-left:1.5rem;}
.pri.sub{display:flex;align-items:center;justify-content:flex-start;color:var(--faint);}
.pri.sub .ms{font-size:1.2rem;}
.pri{font-family:var(--dot);font-size:1.5rem;font-weight:900;color:var(--red);line-height:1;}
.what{font-family:var(--disp);font-size:1.2rem;font-weight:500;letter-spacing:-.005em;line-height:1.3;white-space:nowrap;}
.why{font-size:1.0rem;color:var(--ink);line-height:1.5;}
.purpose{display:flex;flex-direction:column;gap:.4rem;}
.pl{display:flex;align-items:baseline;gap:.6rem;line-height:1.4;}
.plk{font-family:var(--mono);font-size:.68rem;font-weight:700;letter-spacing:.08em;min-width:3.4rem;flex:none;}
.plk.asis{color:var(--mut);}
.plk.tobe{color:var(--red);}
.ped{font-size:1.0rem;color:var(--ink);flex:1;outline:none;}
.owner,.due{font-family:var(--mono);font-size:.92rem;color:var(--mut);letter-spacing:.01em;}
.selwrap{position:relative;display:flex;align-items:center;width:100%;}
.fsel{appearance:none;-webkit-appearance:none;font-family:var(--mono);font-size:.9rem;font-weight:700;letter-spacing:.02em;
  color:var(--ink);background:var(--paper);border:1.5px solid var(--ink);padding:.42rem 1.9rem .42rem .8rem;outline:none;cursor:pointer;width:100%;box-sizing:border-box;}
.fsel:hover{background:#f4f4f4;}
.selcar{position:absolute;right:.5rem;pointer-events:none;font-size:1.15rem;color:var(--ink);}
.fdate{font-family:var(--mono);font-size:.92rem;color:var(--ink);background:var(--paper);
  border:1.5px solid var(--ink);height:45px;padding:0 .5rem;outline:none;cursor:pointer;width:100%;box-sizing:border-box;}
.fdate:hover,.fdate:focus{border-color:var(--ink);}
body.dark .fdate::-webkit-calendar-picker-indicator{filter:invert(1) brightness(1.2);}
.note{font-size:1.0rem;color:var(--ink);line-height:1.45;}
[contenteditable]{outline:none;}
[contenteditable]:hover{background:#f6f6f6;}
[contenteditable]:focus{background:#fff;box-shadow:inset 0 -2px 0 var(--red);}
.row.done .what{color:var(--faint);text-decoration:line-through;}
.row.done .ped,.row.done .note,.row.done .why{color:var(--faint);text-decoration:line-through;}
.row.done .pri{color:#cfcfcf;}
.del{position:absolute;right:.5rem;top:50%;transform:translateY(-50%);width:1.9rem;height:1.9rem;
  display:none;place-items:center;background:var(--paper);border:1px solid var(--line2);color:var(--mut);cursor:pointer;}
.del .ms{font-size:1.1rem;}
.row:hover .del{display:grid;}
.del:hover{background:var(--red);border-color:var(--red);color:#fff;}

.prog{display:flex;flex-direction:row;align-items:center;gap:.7rem;}
.bar{flex:1;display:flex;gap:4px;height:45px;}
.seg{flex:1;height:100%;background:var(--empty);cursor:pointer;}
.seg:hover{filter:brightness(.92);}
.seg.on{background:var(--fill);}
.prog .val{font-family:var(--mono);font-size:.92rem;color:var(--ink);font-weight:700;white-space:nowrap;min-width:3rem;display:flex;align-items:baseline;}
.prog .val .sign{color:var(--mut);font-weight:400;}
.hold{font-family:var(--mono);font-size:.86rem;font-weight:700;letter-spacing:.1em;color:var(--red);}
.holdv{font-family:var(--mono);font-size:.92rem;font-weight:700;letter-spacing:.08em;color:var(--red);outline:none;cursor:text;display:inline-block;min-width:3rem;}
.holdv:empty:before{content:"HOLD";color:var(--red);pointer-events:none;}

.chip,.ochip{display:inline-flex;align-items:center;gap:.45rem;font-family:var(--body);font-size:.92rem;font-weight:700;
  letter-spacing:.02em;white-space:nowrap;border:1.5px solid var(--ink);height:45px;padding:0 .8rem;background:var(--paper);cursor:pointer;
  color:var(--ink);user-select:none;transition:all .12s;box-sizing:border-box;}
.chip .ms,.ochip .ms{font-size:1.1rem;}
.chip:hover{background:#f4f4f4;}
.ochip:hover{filter:brightness(.95);}
.ochip.o0{background:var(--paper);color:var(--mut);border-color:var(--line2);}
.ochip.o1{background:#dde8f7;color:#1f4576;border-color:#a9c4e6;}
.ochip.o2{background:#e1f0d6;color:#345c1d;border-color:#bcdca6;}
.ochip.o3{background:#f6e8cf;color:#6e4a12;border-color:#e6cf9e;}
.ochip.o4{background:#f8dfe7;color:#7c2846;border-color:#eebccc;}
body.dark .ochip.o0{background:var(--paper);color:var(--mut);border-color:var(--line2);}
body.dark .ochip.o1{background:#192c45;color:#9ec3ee;border-color:#2c4a6e;}
body.dark .ochip.o2{background:#1d3317;color:#a8d68a;border-color:#34542a;}
body.dark .ochip.o3{background:#352810;color:#e7b660;border-color:#57401b;}
body.dark .ochip.o4{background:#371f29;color:#ea9fb6;border-color:#583341;}
body.dark .ochip:hover{filter:brightness(1.14);}
.chip.done{background:var(--ink);color:var(--paper);border-color:var(--ink);}
.chip.hold{color:var(--red);border-color:var(--red);}
.chip.carry{color:var(--mut);}

.modal{position:fixed;inset:0;background:rgba(10,10,10,.45);display:grid;place-items:center;z-index:50;}
.modal[hidden]{display:none;}
.modal-card{width:min(620px,92vw);background:var(--paper);border:2px solid var(--ink);padding:1.6rem 1.6rem 1.4rem;}
.modal-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:1rem;}
.m-title{font-family:var(--disp);font-size:1.4rem;font-weight:700;}
.m-sub{font-family:var(--mono);font-size:.72rem;color:var(--faint);letter-spacing:.1em;margin-left:.6rem;}
.ghost{border:none;background:none;}
.ghost:hover{background:none;color:var(--red);transform:none;}
#taskInput{width:100%;height:14rem;border:1.5px solid var(--line2);padding:1rem;font-family:var(--mono);
  font-size:.95rem;line-height:1.7;color:var(--ink);background:var(--paper);resize:vertical;outline:none;}
#taskInput:focus{border-color:var(--ink);}
.modal-actions{display:flex;justify-content:flex-end;gap:.6rem;margin-top:1.1rem;}
.btn{font-family:var(--body);font-size:.95rem;font-weight:700;padding:.6rem 1.2rem;border:1.5px solid var(--ink);
  background:var(--paper);color:var(--ink);cursor:pointer;display:inline-flex;align-items:center;gap:.35rem;transition:all .12s;}
.btn:hover{background:var(--empty);}
.btn .ms{font-size:1.1rem;}
.btn.primary{background:var(--red);border-color:var(--red);color:#fff;}
.btn.primary:hover{background:#b3141b;}
</style>
</head>
<body>
  <header>
    <div class="brand">
      <h1 id="docTitle" contenteditable spellcheck="false">주간 리듬 미팅</h1>
      <span class="part" id="docPart" contenteditable spellcheck="false">UX 기획파트</span>
    </div>
    <div class="weekwrap"><span class="week" id="weekLabel"></span></div>
    <div class="head-right">
      <div class="today" id="today"></div>
      <div class="toolbar">
        <span class="saveind" id="saveind"><span class="ms">check</span>저장됨</span>
        <button class="iconbtn" id="themeBtn" aria-label="다크모드" title="다크모드"><span class="ms">dark_mode</span></button>
        <button class="iconbtn" id="saveBtn" aria-label="DB 저장" title="DB 저장"><span class="ms">save</span></button>
        <button class="iconbtn" id="loadBtn" aria-label="불러오기" title="불러오기"><span class="ms">folder_open</span></button>
        <button class="iconbtn accent" id="addBtn" aria-label="과업 추가" title="과업 추가"><span class="ms">add</span></button>
        <input type="file" id="loadFile" accept=".html,.json,text/html,application/json" hidden>
      </div>
    </div>
  </header>

  <nav id="tabs">
    <button data-day="mon" class="active"><span class="en">MON</span>월요일 · 계획 정렬</button>
    <button data-day="wed"><span class="en">WED</span>수요일 · 중간 조율</button>
    <button data-day="fri"><span class="en">FRI</span>금요일 · 마감 체크</button>
  </nav>

  <div class="sheet">
    <div class="thead" id="thead"></div>
    <div class="tbody" id="tbody"></div>
  </div>

  <div class="modal" id="modal" hidden>
    <div class="modal-card">
      <div class="modal-head">
        <div><span class="m-title">과업 추가</span><span class="m-sub">6하원칙으로 작성하면 자동 정리됩니다</span></div>
        <button class="iconbtn ghost" id="mClose" aria-label="닫기"><span class="ms">close</span></button>
      </div>
      <textarea id="taskInput" spellcheck="false"></textarea>
      <div class="modal-actions">
        <button class="btn" id="mCancel">취소</button>
        <button class="btn primary" id="mAdd"><span class="ms">add</span>추가</button>
      </div>
    </div>
  </div>

<script>
(function(){
  "use strict";
  // ===== Supabase 설정 (여기 두 줄만 채우면 팀 공유 활성화) =====
  var SB_URL="https://nbuxqkxbvygvzlfoezro.supabase.co";   // 예: https://xxxx.supabase.co
  var SB_KEY="sb_publishable_yx7HPeG_bJeXoYTz6RcqCA_IdhEKxZE";   // anon public key
  // ============================================================
  var CLIENT=Math.random().toString(36).slice(2);
  var sb=null,saveT=null;
  function saveRemote(){if(!sb)return;clearTimeout(saveT);saveT=setTimeout(function(){
    sb.from("rhythm").upsert({id:"main",data:Object.assign({},state,{_by:CLIENT}),updated_at:new Date().toISOString()}).then(function(){},function(){});},400);}
  function applyRemote(d){if(!d||!d.tasks||d._by===CLIENT)return;delete d._by;state=d;
    if(!state.title)state.title="주간 리듬 미팅";if(!state.part)state.part="UX 기획파트";
    state.tasks.forEach(function(t,i){if(t.id==null)t.id="t"+i+"_"+Math.random().toString(36).slice(2,7);if(t.asis===undefined&&t.tobe===undefined){t.asis=t.why||"";t.tobe="";}});
    var dt=document.getElementById("docTitle"),dp=document.getElementById("docPart");if(dt)dt.textContent=state.title;if(dp)dp.textContent=state.part;
    render();}
  function initSupabase(){if(!SB_URL||!SB_KEY||!window.supabase)return;
    sb=window.supabase.createClient(SB_URL,SB_KEY);
    sb.from("rhythm").select("data").eq("id","main").single().then(function(r){if(r&&r.data&&r.data.data)applyRemote(r.data.data);},function(){});
    sb.channel("rhythm-main").on("postgres_changes",{event:"*",schema:"public",table:"rhythm",filter:"id=eq.main"},function(p){applyRemote(p&&p.new&&p.new.data);}).subscribe();}
  var LS="axp_rhythm_v3";
  var DOW=["SUN","MON","TUE","WED","THU","FRI","SAT"];
  var DOWK=["일","월","화","수","목","금","토"];
  function pad(n){return(n<10?"0":"")+n;}
  function fmtToday(d){return d.getFullYear()+"."+pad(d.getMonth()+1)+"."+pad(d.getDate())+" "+DOW[d.getDay()];}
  function weekLabel(d){var day=(d.getDay()+6)%7,mon=new Date(d);mon.setDate(d.getDate()-day);
    var fri=new Date(mon);fri.setDate(mon.getDate()+4);
    return mon.getFullYear()+"."+pad(mon.getMonth()+1)+"."+pad(mon.getDate())+" – "+pad(fri.getMonth()+1)+"."+pad(fri.getDate());}

  function seed(){return{tasks:[
    {pri:1,what:"마인드커넥트 UIUX 개선 디자인",asis:"UX·화면 구조 문제",tobe:"톤앤매너 일관성 있게 정리",owner:"이해원 차장",due:"06/26",wedPct:60,wedNote:"담당자 검토 일정 조율",friStatus:"진행중",friNote:"차주 검토·반영"},
    {pri:2,what:"학지사 자사몰 UX 개선",asis:"도서 선택 부담",tobe:"큐레이션으로 개선",owner:"—",due:"—",wedPct:30,wedNote:"—",friStatus:"진행중",friNote:"차주 지속"},
    {pri:3,what:"교원연수 2과정 오픈",asis:"연수 과정 수요",tobe:"학습 과정 확대",owner:"—",due:"06/18",wedPct:80,wedNote:"—",friStatus:"완료",friNote:"—"},
    {pri:4,what:"전사 카탈로그 출판 자동화",asis:"반복 출판 수작업",tobe:"출판 자동화",owner:"—",due:"—",wedPct:10,wedNote:"자료 취합 지연",friStatus:"진행중",friNote:"차주 자료 재요청"},
    {pri:5,what:"번역 플랫폼 개발",asis:"번역 중복 작업",tobe:"플랫폼 통합",owner:"—",due:"—",wedPct:null,wedNote:"의학용어 번역과 중복 (결정 필요)",friStatus:"보류",friNote:"결정 대기"},
    {pri:6,what:"인싸이트 프로모션 게시판 UIUX·기획",asis:"프로모션 진입 동선",tobe:"동선 정리",owner:"—",due:"—",wedPct:100,wedNote:"—",friStatus:"완료",friNote:"—"}
  ]};}

  function loadState(){
    var sd=document.getElementById("seedData");
    if(sd){try{return JSON.parse(sd.textContent);}catch(e){}}
    try{var r=localStorage.getItem(LS);if(r)return JSON.parse(r);}catch(e){}
    return seed();
  }
  var saveTimer;
  function saveLocal(){try{localStorage.setItem(LS,JSON.stringify(state));}catch(e){}saveRemote();
    var el=document.getElementById("saveind");el.classList.add("on");
    clearTimeout(saveTimer);saveTimer=setTimeout(function(){el.classList.remove("on");},1400);}

  var state=loadState();
  if(!state.title)state.title="주간 리듬 미팅";
  if(!state.part)state.part="UX 기획파트";
  state.tasks.forEach(function(t,i){
    if(t.id==null)t.id="t"+i+"_"+Math.random().toString(36).slice(2,7);
    if(t.asis===undefined&&t.tobe===undefined){t.asis=t.why||"";t.tobe="";}
  });
  var curDay="mon";

  var GRID={
    mon:"4.2rem 26rem 100px 1fr 1fr 9rem 10rem",
    wed:"4.2rem 26rem 100px 1fr 13rem 9rem 10rem",
    fri:"4.2rem 26rem 100px 1fr 12rem 9rem 10rem"
  };
  var HEAD={
    mon:["NO","과업","","AS-IS","TO-BE","담당","기한"],
    wed:["NO","과업","","병목 · 변수","진행","담당","기한"],
    fri:["NO","과업","","이월 · 수정 계획","진행","담당","기한"]
  };
  var STATUS=[
    {k:"진행중",icon:"radio_button_unchecked",cls:""},
    {k:"완료",icon:"check_circle",cls:"done"},
    {k:"보류",icon:"pause_circle",cls:"hold"},
    {k:"이월",icon:"arrow_circle_right",cls:"carry"}
  ];
  function statusObj(k){for(var i=0;i<STATUS.length;i++)if(STATUS[i].k===k)return STATUS[i];return STATUS[0];}
  function esc(s){return String(s).replace(/[&<>]/g,function(m){return{"&":"&amp;","<":"&lt;",">":"&gt;"}[m];});}
  function escAttr(s){return esc(s).replace(/"/g,"&quot;");}
  function edWhat(t){return '<div class="what" contenteditable data-field="what" data-id="'+t.id+'" title="'+escAttr(t.what)+'">'+esc(t.what)+'</div>';}
  function segHtml(p){var on=Math.round((p||0)/20),h="";for(var i=0;i<5;i++)h+='<span class="seg'+(i<on?" on":"")+'" data-i="'+i+'"></span>';return h;}
  function progCell(t){
    var hold=(t.wedPct===null||t.wedPct===undefined||t.wedPct==="");
    var bar='<div class="bar">'+segHtml(hold?0:t.wedPct)+'</div>';
    var val=hold
      ? '<span class="val"><span class="holdv" contenteditable data-field="wedPct" data-id="'+t.id+'"></span></span>'
      : '<span class="val"><span contenteditable data-field="wedPct" data-id="'+t.id+'">'+t.wedPct+'</span><span class="sign">%</span></span>';
    return '<div class="prog" data-id="'+t.id+'">'+val+bar+'</div>';
  }
  function chipCell(t){var s=statusObj(t.friStatus);
    return '<button class="chip '+s.cls+'" data-id="'+t.id+'"><span class="ms">'+s.icon+'</span>'+esc(t.friStatus)+'</button>';}
  function ed(f,id,v,cls){return '<div class="'+cls+'" contenteditable data-field="'+f+'" data-id="'+id+'">'+esc(v)+'</div>';}
  function purposeCell(t){
    if(t.asis===undefined&&t.tobe===undefined)
      return '<div class="why" contenteditable data-field="why" data-id="'+t.id+'">'+esc(t.why||"")+'</div>';
    return '<div class="purpose">'
      +'<div class="pl"><span class="plk asis">AS-IS</span><span class="ped" contenteditable data-field="asis" data-id="'+t.id+'">'+esc(t.asis||"")+'</span></div>'
      +'<div class="pl"><span class="plk tobe">TO-BE</span><span class="ped" contenteditable data-field="tobe" data-id="'+t.id+'">'+esc(t.tobe||"")+'</span></div>'
      +'</div>';
  }
  var ROSTER=["이해원 차장","이재현 대리","정유나 대리","노혜진 책임"];
  function ownerList(){return ["—"].concat(ROSTER);}
  function ownerCell(t){
    var label=(t.owner&&t.owner!=="—")?t.owner:"미정";
    var idx=(!t.owner||t.owner==="—")?0:(ROSTER.indexOf(t.owner)+1);if(idx<0)idx=0;
    return '<button class="ochip o'+idx+'" data-field="owner" data-id="'+t.id+'"><span class="ms">person</span>'+esc(label)+'</button>';
  }
  function dueToISO(d){if(!d)return"";if(/^\d{4}-\d{2}-\d{2}$/.test(d))return d;
    var m=/^(\d{1,2})[\/.\-](\d{1,2})$/.exec(d);if(m)return new Date().getFullYear()+"-"+pad(+m[1])+"-"+pad(+m[2]);return"";}
  function dueCell(t){return '<input type="date" class="fdate" data-field="due" data-id="'+t.id+'" value="'+dueToISO(t.due)+'">';}

  // ----- tree (group) helpers -----
  function childrenOf(pid){return state.tasks.filter(function(x){return (x.parent||null)===pid;}).sort(function(a,b){return(a.pri||99)-(b.pri||99);});}
  function buildOrder(){var res=[];(function walk(pid,depth){childrenOf(pid).forEach(function(t){res.push({t:t,depth:depth});walk(t.id,depth+1);});})(null,0);return res;}
  function isDesc(aId,bId){var t=getTask(aId),g=0;while(t&&t.parent&&g++<200){if(t.parent===bId)return true;t=getTask(t.parent);}return false;}
  function renumberAll(){
    var pids=[null].concat(state.tasks.map(function(t){return t.id;}));
    pids.forEach(function(pid){childrenOf(pid).forEach(function(t,i){t.pri=i+1;});});
  }

  function render(){
    document.getElementById("today").textContent=fmtToday(new Date());
    document.getElementById("weekLabel").textContent=state.label||weekLabel(new Date());
    [].forEach.call(document.querySelectorAll("nav button"),function(b){b.classList.toggle("active",b.dataset.day===curDay);});

    var th=document.getElementById("thead");th.style.gridTemplateColumns=GRID[curDay];
    th.innerHTML=HEAD[curDay].map(function(h){return '<div class="h">'+h+'</div>';}).join("");

    var order=buildOrder();
    var tb=document.getElementById("tbody");
    tb.style.gridTemplateRows="repeat("+Math.max(order.length,1)+",1fr)";
    tb.innerHTML=order.map(function(o){
      var t=o.t,depth=o.depth,cells;
      var priCell=depth>0
        ? '<div class="pri sub" data-id="'+t.id+'"><span class="ms">subdirectory_arrow_right</span></div>'
        : '<div class="pri" contenteditable data-field="pri" data-id="'+t.id+'">'+pad(t.pri)+'</div>';
      var sp='<div class="sp"></div>';
      if(curDay==="mon"){cells=
        priCell+edWhat(t)+sp+ed("asis",t.id,t.asis||"","why")+ed("tobe",t.id,t.tobe||"","why")+ownerCell(t)+dueCell(t);
      }else if(curDay==="wed"){cells=
        priCell+edWhat(t)+sp+ed("wedNote",t.id,t.wedNote,"note")+progCell(t)+ownerCell(t)+dueCell(t);
      }else{cells=
        priCell+edWhat(t)+sp+ed("friNote",t.id,t.friNote,"note")+chipCell(t)+ownerCell(t)+dueCell(t);
      }
      var done=(curDay==="fri"&&/완료/.test(t.friStatus))||(curDay==="wed"&&t.wedPct===100);
      return '<div class="row'+(done?" done":"")+(depth>0?" child":"")+'" data-id="'+t.id+'" style="grid-template-columns:'+GRID[curDay]+'">'+
        '<span class="dragh" data-id="'+t.id+'" aria-label="순서 이동"><span class="ms">drag_indicator</span></span>'+
        cells+
        '<button class="del" data-id="'+t.id+'" aria-label="삭제"><span class="ms">delete</span></button></div>';
    }).join("");
  }
  function getTask(id){return state.tasks.filter(function(x){return String(x.id)===String(id);})[0];}

  var tb=document.getElementById("tbody");
  tb.addEventListener("input",function(e){
    var el=e.target;if(!el.dataset||!el.dataset.field)return;
    if(el.tagName==="SELECT"||el.tagName==="INPUT")return;
    var t=getTask(el.dataset.id);if(!t)return;
    var f=el.dataset.field;
    if(f==="wedPct"){var raw=el.textContent.replace(/[^0-9]/g,"");var box=el.closest(".prog");
      if(raw===""){t.wedPct=null;if(box)box.querySelector(".bar").innerHTML=segHtml(0);}
      else{var n=Math.max(0,Math.min(100,parseInt(raw,10)));t.wedPct=n;if(box)box.querySelector(".bar").innerHTML=segHtml(n);}
      if(t.wedPct===100)t.friStatus="완료";else if(t.friStatus==="완료")t.friStatus="진행중";}
    else if(f==="pri"){var p=parseInt(el.textContent.replace(/[^0-9]/g,""),10);if(!isNaN(p))t.pri=p;}
    else t[f]=el.textContent;
    saveLocal();
  });
  tb.addEventListener("focusout",function(e){
    var f=e.target&&e.target.dataset&&e.target.dataset.field;
    if(f==="pri"||f==="wedPct")render();
  });
  tb.addEventListener("change",function(e){
    var el=e.target;if(!el.dataset||!el.dataset.field)return;var t=getTask(el.dataset.id);if(!t)return;
    if(el.dataset.field==="due"){t.due=el.value||"—";saveLocal();return;}
  });
  tb.addEventListener("click",function(e){
    var del=e.target.closest(".del");
    if(del){var t=getTask(del.dataset.id);if(t&&confirm("이 과업을 삭제할까요?\n\n"+t.what)){
      state.tasks.forEach(function(x){if((x.parent||null)===t.id)x.parent=null;});
      state.tasks=state.tasks.filter(function(x){return x.id!==t.id;});renumberAll();saveLocal();render();}return;}
    var seg=e.target.closest(".seg");
    if(seg){var pg=seg.closest(".prog");var ts=pg&&getTask(pg.dataset.id);if(ts){
      var nv=(+seg.dataset.i+1)*20;if(ts.wedPct===nv)nv-=20;ts.wedPct=nv;
      if(nv===100)ts.friStatus="완료";else if(ts.friStatus==="완료")ts.friStatus="진행중";saveLocal();render();}return;}
    var oc=e.target.closest(".ochip");
    if(oc){var to=getTask(oc.dataset.id);if(!to)return;
      var list=ownerList();var oi=list.indexOf(to.owner);if(oi<0)oi=0;
      to.owner=list[(oi+1)%list.length];saveLocal();render();return;}
    var chip=e.target.closest(".chip");
    if(chip){var tt=getTask(chip.dataset.id);if(!tt)return;
      var idx=STATUS.map(function(s){return s.k;}).indexOf(tt.friStatus);
      tt.friStatus=STATUS[(idx+1)%STATUS.length].k;saveLocal();render();}
  });

  // ----- drag & drop reorder -----
  var drag=null;
  function clearMarks(){[].forEach.call(tb.querySelectorAll(".dropbefore,.dropafter,.dropnest"),function(r){r.classList.remove("dropbefore","dropafter","dropnest");});}
  function zoneOf(row,clientY){var r=row.getBoundingClientRect(),y=clientY-r.top,h=r.height;
    var edge=Math.min(h*0.22,14);
    return y<edge?"before":(y>h-edge?"after":"nest");}
  function rowFromPoint(x,y){var el=document.elementFromPoint(x,y);return el&&el.closest?el.closest(".row"):null;}
  function onMove(e){
    if(!drag)return;clearMarks();
    var row=rowFromPoint(e.clientX,e.clientY);
    if(row&&row.dataset.id!==drag.id){var z=zoneOf(row,e.clientY);
      row.classList.add(z==="before"?"dropbefore":z==="after"?"dropafter":"dropnest");}
  }
  function onUp(e){
    document.removeEventListener("mousemove",onMove);document.removeEventListener("mouseup",onUp);
    document.body.classList.remove("dragging-active");
    var dr=tb.querySelector(".dragrow");if(dr)dr.classList.remove("dragrow");
    var row=rowFromPoint(e.clientX,e.clientY),d=drag;drag=null;clearMarks();
    if(d&&row&&row.dataset.id!==d.id)reorder(d.id,row.dataset.id,zoneOf(row,e.clientY));
  }
  tb.addEventListener("mousedown",function(e){
    var h=e.target.closest(".dragh");if(!h)return;
    e.preventDefault();
    drag={id:h.dataset.id};
    var row=h.closest(".row");if(row)row.classList.add("dragrow");
    document.body.classList.add("dragging-active");
    document.addEventListener("mousemove",onMove);document.addEventListener("mouseup",onUp);
  });
  function reorder(srcId,tgtId,mode){
    if(srcId===tgtId)return;
    var src=getTask(srcId),tgt=getTask(tgtId);if(!src||!tgt)return;
    if(isDesc(tgtId,srcId))return;                 // 자기 하위로는 이동 불가
    if(mode==="nest"){
      var groupId=(tgt.parent||null)!=null?tgt.parent:tgt.id;   // 깊이 1단계로 고정
      if(groupId===srcId)return;
      if(childrenOf(srcId).length>0){alert("하위 과업이 있는 항목은 그룹에 넣을 수 없습니다.\n먼저 하위 과업을 분리해 주세요.");return;}
      src.parent=groupId;src.pri=9999;
    }else{
      var newParent=tgt.parent||null;
      if(newParent===srcId)return;
      if(newParent!=null&&childrenOf(srcId).length>0){alert("하위 과업이 있는 항목은 그룹 안으로 옮길 수 없습니다.");return;}
      src.parent=newParent;
      var sibs=childrenOf(newParent).filter(function(x){return x.id!==srcId;}).map(function(x){return x.id;});
      var ti=sibs.indexOf(tgtId);
      if(ti<0)sibs.push(srcId);else sibs.splice(mode==="before"?ti:ti+1,0,srcId);
      sibs.forEach(function(id,i){var x=getTask(id);if(x)x.pri=i+1;});
    }
    renumberAll();saveLocal();render();
  }

  document.getElementById("tabs").addEventListener("click",function(e){
    var b=e.target.closest("button");if(!b)return;curDay=b.dataset.day;render();});

  // ----- add modal -----
  var TPL="(무엇을) \n(누구의) \n(어떤 문제를) \n(어떻게) \n기한 : \n작업자 : \n비고 : ";
  function openModal(){document.getElementById("taskInput").value=TPL;document.getElementById("modal").hidden=false;
    setTimeout(function(){document.getElementById("taskInput").focus();},30);}
  function closeModal(){document.getElementById("modal").hidden=true;}
  document.getElementById("addBtn").addEventListener("click",openModal);
  document.getElementById("mClose").addEventListener("click",closeModal);
  document.getElementById("mCancel").addEventListener("click",closeModal);
  document.getElementById("modal").addEventListener("click",function(e){if(e.target.id==="modal")closeModal();});

  function parseTask(text){
    var defs=[["what",/\(무엇을\)/],["who",/\(누구의\)/],["problem",/\(어떤\s*문제를?\)/],["how",/\(어떻게\)/],["due",/기한\s*[:：]/],["owner",/작업자?\s*[:：]/],["note",/비고\s*[:：]/]];
    var found=[];defs.forEach(function(d){var m=d[1].exec(text);if(m)found.push({k:d[0],s:m.index,e:m.index+m[0].length});});
    found.sort(function(a,b){return a.s-b.s;});
    var r={};for(var i=0;i<found.length;i++){var s=found[i].e,e=(i+1<found.length)?found[i+1].s:text.length;r[found[i].k]=text.slice(s,e).trim();}
    return r;
  }
  function weave(p){var a=[];if(p.who)a.push(p.who);if(p.problem)a.push(p.problem);if(p.how)a.push(p.how);return a.join(" ");}
  document.getElementById("mAdd").addEventListener("click",function(){
    var p=parseTask(document.getElementById("taskInput").value);
    if(!p.what){alert("(무엇을) 항목은 반드시 입력해 주세요.");return;}
    var maxp=state.tasks.reduce(function(m,t){return Math.max(m,t.pri||0);},0);
    state.tasks.push({id:"t"+Date.now(),parent:null,pri:maxp+1,what:p.what,asis:p.problem||"",tobe:p.how||"",owner:p.owner||"—",due:p.due||"—",
      wedPct:null,wedNote:"—",friStatus:"진행중",friNote:p.note||"—"});
    saveLocal();closeModal();render();
  });

  function archiveName(){var d=new Date();
    return d.getFullYear()+"."+pad(d.getMonth()+1)+"."+pad(d.getDate())+"_"+DOWK[d.getDay()]+"_주간리듬미팅_UX기획파트.html";}
  function flashSave(msg){var si=document.getElementById("saveind");if(!si)return;
    si.lastChild&&(si.lastChild.textContent=msg||"저장됨");si.classList.add("on");
    clearTimeout(saveTimer);saveTimer=setTimeout(function(){si.classList.remove("on");},1600);}
  document.getElementById("saveBtn").addEventListener("click",function(){
    if(!state.label)state.label=weekLabel(new Date());
    if(sb){
      sb.from("rhythm").upsert({id:"main",data:Object.assign({},state,{_by:CLIENT}),updated_at:new Date().toISOString()})
        .then(function(r){flashSave(r&&r.error?"저장 실패":"DB 저장됨");},function(){flashSave("저장 실패");});
    }else{
      var old=document.getElementById("seedData");if(old)old.remove();
      var sc=document.createElement("script");sc.id="seedData";sc.type="application/json";sc.textContent=JSON.stringify(state);
      document.head.appendChild(sc);
      var html="<!DOCTYPE html>\n"+document.documentElement.outerHTML;sc.remove();
      var a=document.createElement("a");a.href=URL.createObjectURL(new Blob([html],{type:"text/html"}));
      a.download=archiveName();a.click();
    }
  });

  // ----- load a saved archive (html or json) -----
  document.getElementById("loadBtn").addEventListener("click",function(){document.getElementById("loadFile").click();});
  document.getElementById("loadFile").addEventListener("change",function(e){
    var f=e.target.files[0];if(!f)return;var r=new FileReader();
    r.onload=function(){var txt=r.result,data=null;
      var m=/<script id="seedData"[^>]*>([\s\S]*?)<\/script>/.exec(txt);
      try{data=m?JSON.parse(m[1]):JSON.parse(txt);}catch(err){alert("불러오기 실패: 저장된 리듬미팅 HTML 또는 JSON만 가능합니다.");return;}
      if(!data||!data.tasks){alert("불러오기 실패: 과업 데이터를 찾을 수 없습니다.");return;}
      state=data;saveLocal();render();};
    r.readAsText(f);e.target.value="";
  });

  // ----- editable title / part -----
  var docTitle=document.getElementById("docTitle"),docPart=document.getElementById("docPart");
  docTitle.textContent=state.title;docPart.textContent=state.part;
  docTitle.addEventListener("input",function(){state.title=docTitle.textContent.trim();saveLocal();});
  docPart.addEventListener("input",function(){state.part=docPart.textContent.trim();saveLocal();});

  // 서식 없는 순수 텍스트로만 붙여넣기 (문서 기본 폰트 유지)
  document.addEventListener("paste",function(e){
    var el=e.target;if(!el||!el.isContentEditable)return;
    e.preventDefault();
    var text=((e.clipboardData||window.clipboardData).getData("text/plain")||"").replace(/\r/g,"");
    document.execCommand("insertText",false,text);
  });

  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal();});

  // ----- dark mode -----
  function applyTheme(d){document.body.classList.toggle("dark",d);
    document.querySelector("#themeBtn .ms").textContent=d?"light_mode":"dark_mode";}
  var dark=false;try{dark=localStorage.getItem("axp_theme")==="dark";}catch(e){}
  applyTheme(dark);
  document.getElementById("themeBtn").addEventListener("click",function(){
    dark=!dark;applyTheme(dark);try{localStorage.setItem("axp_theme",dark?"dark":"light");}catch(e){}});

  render();
  initSupabase();
})();
</script>
</body>
</html>
